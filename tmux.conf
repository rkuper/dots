###################################
#                                 #
#           TMUX Setup            #
#                                 #
###################################


###################################
#             Sttings             #
###################################

# Mouse control
set -g mouse on
set -g escape-time 10

# Plugin settings
TMUX_FZF_OPTIONS="-p -w 62% -h 38% -m"
set -g @open-lazygit 'G'
set -g @treemux-tree-nvim-init-file '~/.tmux/plugins/treemux/configs/treemux_init.lua'
set -g @resurrect-dir '~/.tmux/resurrect'

# Misc settings
setw -g mode-keys       vi
set  -g status-position bottom
set  -g status-right    '%Y-%m-%d %H:%M #{tmux_mode_indicator}'

# Terminal/color handling
set -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:RGB,screen*:title:RGB,myxterm:RGB,tmux*:RGB'
set -g terminal-overrides 'xterm*:Tc,screen*:Tc,tmux*:Tc'

set -as terminal-overrides ',myxterm:Tc:kLFT5=\E[1;5D:kRIT5=\E[1;5C:kLFT6=\E[1;6D:kRIT6=\E[1;6C'
set -g default-terminal "tmux-256color"
set -g allow-passthrough on
set -g focus-events on



###################################
#             Bindings            #
###################################

TMUX_FZF_LAUNCH_KEY="C-f"

# New prefix for tmux
unbind-key C-b
set -g prefix 'C-Space'
bind-key 'C-Space' send-prefix

# Switch panes with Alt-arrows w/o prefix
bind -n M-Left    select-pane -L
bind -n M-Down    select-pane -D
bind -n M-Up      select-pane -U
bind -n M-Right   select-pane -R

bind -n M-h       select-pane -L
bind -n M-j       select-pane -D
bind -n M-k       select-pane -U
bind -n M-l       select-pane -R

bind -n C-S-Left  select-pane -L
bind -n C-S-Down  select-pane -D
bind -n C-S-Up    select-pane -U
bind -n C-S-Right select-pane -R

bind -n C-S-h     select-pane -L
bind -n C-S-j     select-pane -D
bind -n C-S-k     select-pane -U
bind -n C-S-l     select-pane -R

# Bindings for window switching
bind -n M-S-Left  previous-window
bind -n M-S-Right next-window

bind -n M-H       previous-window
bind -n M-L       next-window

bind -r h previous-window
bind -r l next-window

# Bindings for scrolling
bind-key -T copy-mode-vi S-Up   send-keys -X scroll-up 10
bind-key -T copy-mode-vi S-Down send-keys -X scroll-down 10
bind-key -T copy-mode-vi K      send-keys -X scroll-up 10
bind-key -T copy-mode-vi J      send-keys -X scroll-down 10

# Selection in tmux scrolling
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Better split bindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Resizing
bind J resize-pane -D 10
bind K resize-pane -U 10
bind H resize-pane -L 10
bind L resize-pane -R 10

# Refresh tmux with this config file
unbind r
bind r source-file ~/.tmux.conf



###################################
#             Plugins             #
###################################

# Install via git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nordtheme/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'AngryMorrocoy/tmux-neolazygit'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'kiyoon/treemux'
run '~/.tmux/plugins/tpm/tpm'
